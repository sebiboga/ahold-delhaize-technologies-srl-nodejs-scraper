name: Automation Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ensure AD/01 exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          # Check if AD/01 exists
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:49544242&rows=1" | jq '.response.numFound')
          
          echo "AD/01 count in company core: $EXISTING"
          
          # Add only if not exists
          if [ "$EXISTING" -eq "0" ]; then
            echo "AD/01 not found - adding to company core..."
            echo '[{"id":"49544242","company":"AHOLD DELHAIZE TECHNOLOGIES S.R.L.","brand":"AD/01","status":"activ","location":["Bucuresti"],"website":["https://www.ad01.com"],"career":["https://www.ad01.com/vacancies"],"lastScraped":"2026-04-24","scraperFile":"https://raw.githubusercontent.com/sebiboga/ahold-delhaize-technologies-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json
            
            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "AD/01 already exists in company core - no action needed"
          fi
          
          # Verify
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:49544242&rows=1" | jq '.response.numFound')
          
          echo "AD/01 count after check: $FINAL"
          
          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: AD/01 is in company core"
          else
            echo "❌ FAILED: AD/01 still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Run Integration Tests
        run: npm install && npm run test:integration
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Run E2E Tests
        run: npm install && npm run test:e2e
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}